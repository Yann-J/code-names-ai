# Non-root nginx front for Docker: static PWA on disk, API/WebSockets to uvicorn.
# Sits behind a public reverse proxy (443/80); never emit :8000 in redirects.

pid /tmp/nginx.pid;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Preserve the public URL from an outer reverse proxy when present.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $http_x_forwarded_host $forwarded_host {
        default $http_x_forwarded_host;
        ''      $host;
    }

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    upstream codenames_api {
        server 127.0.0.1:8001;
        keepalive 8;
    }

    server {
        listen 8000;
        server_name _;

        # Relative redirects only — avoid Location: https://host:8000/...
        absolute_redirect off;
        port_in_redirect off;

        location = / {
            return 302 /app/;
        }

        location = /app {
            return 302 /app/;
        }

        location ~ ^/app/assets/(.+)$ {
            alias /app/src/codenames_ai/web/static/pwa/assets/$1;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /app/ {
            alias /app/src/codenames_ai/web/static/pwa/;
            try_files $uri $uri/ @pwa_spa;
        }

        location @pwa_spa {
            root /app/src/codenames_ai/web/static/pwa;
            try_files /index.html =404;
            default_type text/html;
            add_header Cache-Control "no-store, max-age=0";
        }

        location = /app/index.html {
            alias /app/src/codenames_ai/web/static/pwa/index.html;
            add_header Cache-Control "no-store, max-age=0";
        }

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $forwarded_host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            # Default nginx proxy_read_timeout is 60s; LLM analysis can run much longer.
            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_pass http://codenames_api;
        }

        location /live/ {
            proxy_http_version 1.1;
            proxy_set_header Host $forwarded_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout 86400s;
            proxy_read_timeout 86400s;
            proxy_pass http://codenames_api;
        }
    }
}
