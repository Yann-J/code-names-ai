{% extends "base.html" %}
{% block title %}New game · Code Names AI{% endblock %}
{% block body %}
<h1>New game</h1>
<form method="post" action="/play/start" class="inline">
    <p><label>Seed <input name="seed" type="number" value="0"/></label>
       <label>Risk <input name="risk" type="number" step="0.05" min="0" max="1" value="0.5"/></label></p>
    <p>Red spymaster
        <label><input type="radio" name="red_spy" value="human"/> Human</label>
        <label><input type="radio" name="red_spy" value="ai" checked/> AI</label>
    </p>
    <p>Red guesser
        <label><input type="radio" name="red_guess" value="human"/> Human</label>
        <label><input type="radio" name="red_guess" value="ai" checked/> AI</label>
    </p>
    <p>Blue spymaster
        <label><input type="radio" name="blue_spy" value="human"/> Human</label>
        <label><input type="radio" name="blue_spy" value="ai" checked/> AI</label>
    </p>
    <p>Blue guesser
        <label><input type="radio" name="blue_guess" value="human"/> Human</label>
        <label><input type="radio" name="blue_guess" value="ai" checked/> AI</label>
    </p>
    <p><button type="submit">Start</button></p>
</form>
{% endblock %}
