<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{% block title %}Code Names AI{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root { font-family: system-ui, sans-serif; color: #1a1a1a; background: #f4f4f2; }
        body { margin: 0 auto; max-width: 960px; padding: 1.25rem; }
        a { color: #0b5; }
        header { margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.35rem; }
        .card { background: #fff; border-radius: 6px; padding: 0.5rem; text-align: center; font-size: 0.85rem;
                border: 1px solid #ccc; min-height: 2.5rem; display:flex; align-items:center; justify-content:center;}
        .red { border-color: #c44; background: #ffe8e8; }
        .blue { border-color: #48a; background: #e8f1ff; }
        .neutral { border-color: #999; background: #f0f0f0; }
        .assassin { border-color: #111; background: #222; color: #eee; }
        .muted { color: #666; font-size: 0.9rem; }
        table { border-collapse: collapse; width: 100%; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 0.35rem 0.5rem; text-align: left; font-size: 0.85rem; }
        th { background: #eaeaea; }
        form.inline label { display: inline-block; margin-right: 0.5rem; }
        button, input[type=submit] { cursor: pointer; }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
<header>
    <strong>Code Names AI</strong>
    &middot; <a href="/">Home</a>
    &middot; <a href="/play">Play</a>
    &middot; <a href="/analysis">Analysis</a>
</header>
{% block body %}{% endblock %}
</body>
</html>
