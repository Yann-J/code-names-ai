# Canonical eval/serve config: explicit defaults for every key in EvalAgentConfigFile and
# nested models. Field order follows src/codenames_ai/cli/eval_config.py.
#
# Scoring vetoes / MC softmax / rewards below match ScoringWeights.from_risk(base_risk) at the
# current `risk.base_risk` (here 0.5). In code, setting any of these back to null re-derives from
# `risk.base_risk` at load time. Child configs that change `risk.base_risk` should set those four vetoes to
# null under `scoring:` (or replace with values for their risk) — see config/base.yaml.
#
# Inheritance: optional `extends` lists YAML file(s) merged before this file
# (each path is relative to the file that contains `extends`). This file overrides
# parents; later parents in a list override earlier ones.

---
# -- EvalAgentConfigFile --
# Short name for eval comparison tables and parquet metadata rows.
label: default

# Risk settings: `base_risk` in [0, 1] → looser clue vetoes, warmer MC softmax, and a
# guesser that stops guesses sooner when confidence is low. Values under scoring that
# match from_risk(base_risk) should stay in sync when you change this, or set those keys to
# null to recompute from base_risk in the agent runtime.
risk:
  base_risk: 0.5

# Dynamic risk (#1): board-aware Δ (opponent unrevealed − ours). When enabled,
# effective_risk = clamp(base_risk·exp(−s·Δ), …) nudges margin_floor /
# assassin_ceiling / guesser stops. Matches static behaviour when disabled.
dynamic_risk:
  enabled: false
  s: 0.12
  min_risk: 0.0
  max_risk: 1.0
  beta_margin_floor: 0.25
  beta_assassin_ceiling: 0.25
  beta_confidence_floor: 0.25
  beta_bonus_gap: 0.25

# -- VocabularyConfig --
vocabulary:
  # fastText + lexicon language code (e.g. en → cc.en.300.bin).
  language: en

  # No exclusions file: omit this key (schema default). Set to a path string for one word
  # per line; relative paths resolve against the directory of the YAML path on the CLI.
  exclusions_path: ../data/exclusions/en

  # Board card words: Zipf frequency window and spaCy coarse POS tags (UD-style).
  game:
    zipf:
      min: 4.0
      max: 6.5
    allowed_pos:
      - NOUN

  # Clue-candidate pool: wider Zipf band and more POS than game cards.
  clue:
    zipf:
      min: 3.0
      max: 7.0
    allowed_pos:
      - NOUN
      - ADJ
      - VERB

# How many ranked (clue, N, targets) rows to keep in traces and the Analysis API
# after reranking (not the same as the LLM rerank shortlist below).
top_k_trace: 200

# -- GuesserConfig --
guesser:
  # Board candidates shown to the guesser LLM beyond the clue count N (ranking context).
  extra_candidates: 3

  # Stochastic guess selection: 0 = always pick the top-ranked card; >0 applies softmax
  # over logits. Ignored when the guesser is fully deterministic / no rerank path.
  sampling_temperature: 0.0

  # With stochastic guesses, sample only from this many top-ranked unrevealed cards; 0 = all.
  sampling_top_k: 0

# -- ScoringConfig (resolved for risk = 0.5 via ScoringWeights.from_risk) --
scoring:
  # When true and LLM credentials exist, blend embedding EV with LLM confidence for
  # spymaster and guesser; requires LLM_KEY for full runtime.
  llm_rerank: true

  # Final spymaster score mixes MC expected value and LLM: alpha * EV + (1-alpha) * (LLM * N_eff).
  blend_alpha: 0.5

  # Hard veto: minimum margin for a candidate to survive.
  margin_floor: 0.05

  # Hard veto: max assassin similarity before the clue is rejected.
  assassin_ceiling: 0.35

  # MC rollout: divides similarity logits before softmax.
  mc_temperature: 0.18

  # MC softmax: subtract bias * log1p(rank-by-similarity) from logits.
  mc_rank_bias: 1.3

  # Monte Carlo per-pick rewards (same for all risk when taken from from_risk defaults).
  reward_friendly: 1.0
  reward_neutral: -0.35
  reward_opponent: -0.8
  reward_assassin: -3.0

  # Fixed MC trial counts before adaptive refinement.
  mc_trials: 96
  adaptive_mc_base_trials: 64
  adaptive_mc_extra_trials: 96

  # If a candidate’s EV is within this band of the best, run extra MC trials.
  adaptive_mc_ev_band: 0.10

  # Maximum clue target count N considered per candidate (prefix length cap).
  lane_max_n: 7

  # After embedding / EV shortlisting, how many candidates are passed to the spymaster LLM
  # reranker (ignored if llm_rerank is false).
  embedding_top_k: 20
