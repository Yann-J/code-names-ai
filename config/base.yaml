# Local preset for `serve` / eval: inherits documented defaults then overrides.
extends: default.yaml

label: base

risk:
  base_risk: 0.6

dynamic_risk:
  enabled: true

guesser:
  sampling_temperature: 0.5
  sampling_top_k: 0

# Re-enable risk-derived vetoes / MC temperature / rank bias (default.yaml pins numeric
# defaults for base_risk=0.5; we override with null so runtime uses from_risk(0.6)).
scoring:
  margin_floor: null
  assassin_ceiling: null
  mc_temperature: null
  mc_rank_bias: null
