name: docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    name: build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config --quiet

      # ------------------------------------------------------------------
      # Deploy: render .env from secrets, ship compose+env to the host,
      # then `docker login + pull + up` over SSH. Only on push-to-main.
      # ------------------------------------------------------------------

      - name: Render .env from secrets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/master')
        env:
          LLM_API: ${{ secrets.LLM_API }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_KEY: ${{ secrets.LLM_KEY }}
        run: |
          {
            echo "LLM_API=${LLM_API}"
            echo "LLM_MODEL=${LLM_MODEL}"
            echo "LLM_KEY=${LLM_KEY}"
          } > .env

      - name: Copy compose file & .env to deploy host
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/master')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,.env"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Compose pull & up on deploy host
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/master')
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker logout ghcr.io || true
            docker image prune -f
            docker compose ps
